# Site settings
title: Home # site title
description: >- # site description
 This is site has been used to share my ctf solutions <a href="https://github.com/shemkumar" target="_blank" rel="noopener">@github</a>.
lang: en-US # default lang
timezone: Asia/Jakarta # set your timezone
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/piharpi/jekyll-klise # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Shemkumar P # author name
  bio: >- # tell to the world
    I am a dedicated CTF player with a strong passion for cybersecurity and problem-solving. Over the years, I have participated in numerous CTF competitions, sharpening my skills in various domains such as cryptography, reverse engineering, web exploitation, forensics, and more. My journey in cybersecurity is driven by a constant desire to learn and adapt to the ever-changing landscape of digital threats. <a href="https://github.com/shemkumar" target="_blank" rel="noopener">@github</a>.
  username: shemkumar
  github: shemkumar # github usernam
  email: thunderbolt20200@gmail.com # email adress
  avatar: /assets/img/avatar.jpg # change with your own avatar

# URL settings
url: "https://shemkumar.github.io" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
